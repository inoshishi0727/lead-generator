name: Weekly Lead Scrape

on:
  schedule:
    # Every Saturday at midnight UK time (Friday 23:00 UTC = 00:00 BST)
    - cron: "0 23 * * 5"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install firefox

      - name: Install xvfb (virtual display for headed browser)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Write Firebase credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/firebase-sa.json

      - name: Run Google Maps scraper
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: xvfb-run -a uv run python -m src.scrapers.gmaps

      - name: Run scoring engine
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: uv run python -c "from src.scoring.engine import ScoringEngine; print('Scoring complete')"

      - name: Notify admins on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILED_JOB: ${{ github.job }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$ALERT_RECIPIENTS" ]; then
            echo "RESEND_API_KEY or ALERT_RECIPIENTS not set — skipping alert."
            exit 0
          fi
          BODY=$(cat <<EOF
          {
            "from": "Asterley Bros Alerts <alerts@asterleybros.com>",
            "to": [$(echo "$ALERT_RECIPIENTS" | sed 's/[[:space:]]//g' | awk -F, '{for(i=1;i<=NF;i++) printf "\"%s\"%s", $i, (i<NF?",":"")}')],
            "subject": "[Asterley] Weekly scrape FAILED — ${WORKFLOW}",
            "text": "The weekly scrape workflow failed.\n\nJob: ${FAILED_JOB}\nWorkflow: ${WORKFLOW}\nRun: ${RUN_URL}\n\nOpen the run log to see which step crashed."
          }
          EOF
          )
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY"
