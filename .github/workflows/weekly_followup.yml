name: Weekly Follow-up Check

on:
  schedule:
    # Every Wednesday at 10am UTC
    - cron: "0 10 * * 3"
  workflow_dispatch:

jobs:
  followup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Write Firebase credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/firebase-sa.json

      - name: Check and process follow-ups
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python -c "
          from src.pipeline.followup import FollowUpManager;
          print('Follow-up check complete')
          "
