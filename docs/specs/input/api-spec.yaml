openapi: "3.1.0"
info:
  title: Asterley Bros Lead Generation — Internal API
  version: "0.2.0"
  description: >
    Internal contracts for data flow between system components.
    Not a REST API — these define the Firestore document schemas and
    Cloud Function callable signatures used across modules.

components:
  schemas:
    # ---- User & Auth ----

    UserRole:
      type: string
      enum: [admin, member, viewer]
      description: >
        admin: full access, can assign leads, manage team.
        member: sees only assigned leads, can approve/send own.
        viewer: read-only access to all leads.

    UserDoc:
      type: object
      required: [uid, email, role, workspace_id, created_at]
      properties:
        uid:
          type: string
          description: Firebase Auth UID
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        workspace_id:
          type: string
        created_at:
          type: string
          format: date-time

    # ---- Lead ----

    Lead:
      type: object
      required: [source, business_name]
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
          enum: [google_maps, instagram, manual]
        business_name:
          type: string
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        rating:
          type: number
          format: float
          nullable: true
        review_count:
          type: integer
          nullable: true
        category:
          type: string
          nullable: true
        instagram_handle:
          type: string
          nullable: true
        instagram_followers:
          type: integer
          nullable: true
        score:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        score_breakdown:
          type: object
          additionalProperties:
            type: object
            properties:
              points:
                type: integer
              reason:
                type: string
          nullable: true
        stage:
          type: string
          enum:
            - scraped
            - needs_email
            - enriched
            - scored
            - draft_generated
            - approved
            - sent
            - follow_up_1
            - follow_up_2
            - responded
            - converted
            - declined
          default: scraped
        scraped_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        location_city:
          type: string
          nullable: true
        location_area:
          type: string
          nullable: true
        location_postcode:
          type: string
          nullable: true

        # ---- Assignment fields (NEW) ----
        assigned_to:
          type: string
          nullable: true
          description: >
            Firebase Auth UID of the team member this lead is assigned to.
            null = unassigned (admin pool). Admin's own leads use admin's UID.
        assigned_to_name:
          type: string
          nullable: true
          description: >
            Denormalized display name of the assigned member.
            Used for UI rendering without an extra lookup.
        assigned_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp of the most recent assignment.
        assigned_by:
          type: string
          nullable: true
          description: UID of the admin who made the assignment.

    # ---- Outreach Message ----

    OutreachMessage:
      type: object
      required: [lead_id, channel, content]
      properties:
        id:
          type: string
          format: uuid
        lead_id:
          type: string
          format: uuid
        channel:
          type: string
          enum: [email, instagram_dm]
        subject:
          type: string
          nullable: true
          description: "Email subject line (null for DMs)"
        content:
          type: string
        status:
          type: string
          enum: [draft, approved, rejected, sent, planned]
          default: draft
        step_number:
          type: integer
          default: 1
        follow_up_label:
          type: string
          nullable: true
        scheduled_send_date:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        sent_at:
          type: string
          format: date-time
          nullable: true
        # ---- Assignment (NEW) ----
        assigned_to:
          type: string
          nullable: true
          description: >
            Inherited from the lead at draft generation time.
            Ensures outreach page filtering works without joining to leads.

    # ---- Inbound Reply ----

    InboundReply:
      type: object
      required: [from_email, body, source, direction]
      properties:
        id:
          type: string
        lead_id:
          type: string
          nullable: true
        message_id:
          type: string
          nullable: true
        from_email:
          type: string
          format: email
        from_name:
          type: string
          nullable: true
        subject:
          type: string
          nullable: true
        body:
          type: string
        source:
          type: string
          enum: [email_forward, manual, resend, outbound_reply]
        direction:
          type: string
          enum: [inbound, outbound]
        matched:
          type: boolean
        created_at:
          type: string
          format: date-time
        sentiment:
          type: string
          enum: [positive, negative, neutral]
          nullable: true
        # ---- Assignment (NEW) ----
        assigned_to:
          type: string
          nullable: true
          description: Inherited from lead when reply is matched.

    # ---- Callable Function Contracts ----

    AssignLeadsRequest:
      type: object
      required: [lead_ids, assigned_to]
      properties:
        lead_ids:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 500
          description: Firestore document IDs of leads to assign.
        assigned_to:
          type: string
          description: >
            Firebase Auth UID of the target team member.
            Must be a valid user with role "admin" or "member" in the same workspace.
      description: >
        Callable function: assignLeads. Admin-only.
        Assigns leads + their outreach_messages + inbound_replies to the target user.
        Logs action to activity_log.

    AssignLeadsResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        assigned:
          type: integer
          description: Number of leads successfully assigned.
        assigned_to:
          type: string
        assigned_to_name:
          type: string

    UnassignLeadsRequest:
      type: object
      required: [lead_ids]
      properties:
        lead_ids:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 500
          description: Firestore document IDs of leads to unassign.
      description: >
        Callable function: unassignLeads. Admin-only.
        Sets assigned_to = null on leads + their messages + replies.
        Returns leads to the unassigned admin pool.

    UnassignLeadsResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        unassigned:
          type: integer

    # ---- Legacy schemas (unchanged) ----

    ScrapeRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
          enum: [google_maps, instagram]
        query:
          type: string
        leads_found:
          type: integer
        leads_new:
          type: integer
        status:
          type: string
          enum: [running, completed, failed]
        error:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    ScoringRequest:
      type: object
      required: [lead_id]
      properties:
        lead_id:
          type: string
          format: uuid
        weights_override:
          type: object
          additionalProperties:
            type: integer
          nullable: true

    ScoringResult:
      type: object
      properties:
        lead_id:
          type: string
          format: uuid
        total_score:
          type: integer
        breakdown:
          type: object
          additionalProperties:
            type: object
            properties:
              points:
                type: integer
              reason:
                type: string
        passed_threshold:
          type: boolean

    DraftRequest:
      type: object
      required: [lead_id, channel]
      properties:
        lead_id:
          type: string
          format: uuid
        channel:
          type: string
          enum: [email, instagram_dm]
        template_override:
          type: string
          nullable: true

    PipelineStageUpdate:
      type: object
      required: [lead_id, new_stage]
      properties:
        lead_id:
          type: string
          format: uuid
        new_stage:
          type: string
        notes:
          type: string
          nullable: true
