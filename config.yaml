project:
  name: "Asterley Bros Lead Generation"
  version: "0.1.0"

exclusion:
  stockist_csv: "Stockist Spreadsheet 1.csv"

scraping:
  google_maps:
    target_count: 60
    max_parallel_browsers: 3
    search_queries:
      - "cocktail bars London"
      - "wine bars London"
      - "restaurants with bar London"
      - "boutique hotels London bar"
      - "independent bottle shops London"
      - "deli and wine shop London"
    scroll_pause_seconds: 2
    max_stale_rounds: 3
    locale: "en"
    headless: false

  email_extraction:
    gemini_enabled: true
    gemini_max_text_chars: 8000

  instagram:
    target_count: 40
    max_parallel_browsers: 2
    hashtags:
      - "londoncocktails"
      - "londonbars"
      - "craftspirits"
      - "londondrinks"
      - "vermouthlovers"
    max_profiles_per_hashtag: 20
    headless: false

  enrichment:
    enabled: true
    camoufox_timeout_seconds: 20
    pages_to_visit:
      - "/"
      - "/menu"
      - "/about"
      - "/contact"
    gemini_model: "gemini-2.5-flash"
    gemini_max_input_chars: 12000
    gemini_max_tokens: 4000
    gemini_temperature: 0.2
    max_concurrent: 3
    headless: false

scoring:
  weights:
    has_website: 5
    has_email: 12
    has_phone: 3
    rating_above_4: 8
    review_count_above_50: 7
    serves_cocktails: 15
    independent_venue: 10
    in_target_area: 8
    active_instagram: 5
    menu_fit_score: 15
    venue_category_match: 12
  min_score_threshold: 40

outreach:
  gemini:
    model: "gemini-2.5-pro"
    max_tokens: 2000
    temperature: 0.7
  email:
    daily_limit: 50
    batch_size: 10
    delay_between_seconds: 30
  dm:
    daily_limit: 20
    delay_between_seconds: 60

pipeline:
  stages:
    - scraped
    - needs_email
    - enriched
    - scored
    - draft_generated
    - approved
    - sent
    - follow_up_1
    - follow_up_2
    - responded
    - converted
    - declined
  follow_up_days:
    first: 5
    second: 12

lead_ratios:
  cocktail_bar: 0.20
  wine_bar: 0.15
  hotel_bar: 0.10
  italian_restaurant: 0.10
  gastropub: 0.10
  bottle_shop: 0.10
  restaurant_groups: 0.05
  other: 0.20

rate_limits:
  google_maps_rpm: 10
  instagram_rpm: 5
  gemini_rpm: 30
  resend_rpm: 10
  enrichment_rpm: 20
