project:
  name: "Asterley Bros Lead Generation"
  version: "0.1.0"

exclusion:
  stockist_csv: "Stockist Spreadsheet 1.csv"

scraping:
  google_maps:
    target_count: 60
    max_parallel_browsers: 3
    search_queries:
      # Core bar/drinks categories
      - "cocktail bars UK"
      - "wine bars UK"
      - "restaurants with bar UK"
      - "boutique hotels UK bar"
      # Retail
      - "independent bottle shops UK"
      - "deli and wine shop UK"
      - "farm shops UK"
      - "luxury food shops UK"
      - "independent grocery shops UK"
      # Dining
      - "Italian restaurants UK"
      - "gastropubs UK"
      # Events & hospitality
      - "events catering companies UK"
      - "festival food vendors UK"
      - "restaurant groups UK"
      # Membership & education
      - "private members clubs UK"
      - "cookery schools UK"
      # Corporate
      - "corporate gift hampers UK"
    scroll_pause_seconds: 2
    max_stale_rounds: 3
    locale: "en"
    headless: false

  google_search:
    results_per_query: 20
    max_parallel_browsers: 2
    headless: false
    search_queries:
      - "UK spirits subscription box companies"
      - "airline beverage suppliers UK"
      - "train catering suppliers UK spirits"
      - "yacht charter catering UK drinks"
      - "film TV production catering UK drinks"
      - "RTD ready to drink spirits brands UK"
    skip_domains:
      - "youtube.com"
      - "wikipedia.org"
      - "reddit.com"
      - "tripadvisor.com"
      - "yelp.com"
      - "facebook.com"
      - "instagram.com"
      - "twitter.com"
      - "linkedin.com"
      - "pinterest.com"
      - "tiktok.com"
      - "amazon.co.uk"
      - "amazon.com"
      - "ebay.co.uk"

  bing_search:
    results_per_query: 20
    max_parallel_browsers: 2
    headless: false
    search_queries:
      - "UK spirits subscription box companies"
      - "airline beverage suppliers UK"
      - "train catering suppliers UK spirits"
      - "yacht charter catering UK drinks"
      - "film TV production catering UK drinks"
      - "RTD ready to drink spirits brands UK"
    skip_domains:
      - "youtube.com"
      - "wikipedia.org"
      - "reddit.com"
      - "tripadvisor.com"
      - "yelp.com"
      - "facebook.com"
      - "instagram.com"
      - "twitter.com"
      - "linkedin.com"
      - "pinterest.com"
      - "tiktok.com"
      - "amazon.co.uk"
      - "amazon.com"
      - "ebay.co.uk"

  directory:
    max_results_per_category: 50
    max_parallel_browsers: 2
    headless: false
    category_urls:
      # Yell.com — UK business directory
      - "https://www.yell.com/s/cocktail+bars-uk.html"
      - "https://www.yell.com/s/wine+bars-uk.html"
      - "https://www.yell.com/s/italian+restaurants-uk.html"
      - "https://www.yell.com/s/gastropubs-uk.html"
      - "https://www.yell.com/s/off+licences-uk.html"
      - "https://www.yell.com/s/delicatessens-uk.html"
      # Trustpilot — business reviews
      - "https://www.trustpilot.com/categories/food_beverage_tobacco"

  industry_sites:
    max_parallel_browsers: 1
    headless: false
    sites:
      - name: "spirits_business"
        base_url: "https://www.thespiritsbusiness.com"
        listing_paths:
          - "/supplier-directory/"
        max_results: 30
      - name: "diffords_guide"
        base_url: "https://www.diffordsguide.com"
        listing_paths:
          - "/bars/"
        max_results: 30
      - name: "drinks_international"
        base_url: "https://www.drinksint.com"
        listing_paths:
          - "/suppliers/"
        max_results: 30

  email_extraction:
    gemini_enabled: true
    gemini_max_text_chars: 8000

  instagram:
    target_count: 40
    max_parallel_browsers: 2
    hashtags:
      - "ukcocktails"
      - "ukbars"
      - "craftspirits"
      - "ukdrinks"
      - "vermouthlovers"
    max_profiles_per_hashtag: 20
    headless: false

  enrichment:
    enabled: true
    camoufox_timeout_seconds: 20
    pages_to_visit:
      - "/"
      - "/menu"
      - "/about"
      - "/contact"
    gemini_model: "gemini-2.5-flash"
    gemini_max_input_chars: 40000
    gemini_max_tokens: 4000
    gemini_temperature: 0.2
    max_concurrent: 3
    headless: false

scoring:
  weights:
    has_website: 5
    has_email: 12
    has_phone: 3
    rating_above_4: 8
    review_count_above_50: 7
    serves_cocktails: 15
    independent_venue: 10
    in_target_area: 8
    active_instagram: 5
    menu_fit_score: 15
    venue_category_match: 12
  min_score_threshold: 40

outreach:
  gemini:
    model: "gemini-2.5-pro"
    max_tokens: 2000
    temperature: 0.7
  email:
    daily_limit: 50
    batch_size: 10
    delay_between_seconds: 30
  dm:
    daily_limit: 20
    delay_between_seconds: 60

pipeline:
  stages:
    - scraped
    - needs_email
    - enriched
    - scored
    - draft_generated
    - approved
    - sent
    - follow_up_1
    - follow_up_2
    - no_response
    - responded
    - converted
    - declined
  follow_up_days:
    first: 7
    second: 14
    third: 18
  draft_lead_days: 1

lead_ratios:
  cocktail_bar: 0.20
  wine_bar: 0.15
  hotel_bar: 0.10
  italian_restaurant: 0.10
  gastropub: 0.10
  bottle_shop: 0.10
  restaurant_groups: 0.05
  other: 0.20

rate_limits:
  google_maps_rpm: 10
  google_search_rpm: 8
  bing_search_rpm: 12
  directory_rpm: 10
  industry_sites_rpm: 8
  instagram_rpm: 5
  gemini_rpm: 30
  resend_rpm: 10
  enrichment_rpm: 20
